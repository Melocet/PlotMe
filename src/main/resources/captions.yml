# Color codes: when 'use-legacy-texts' is false in config.yml (default),
# Bukkit-style '&'-codes in these values are translated to '§' at send-time,
# so chat renders in color. Examples: &a green, &c red, &e yellow, &b aqua,
# &7 gray, &f white, &l bold. When 'use-legacy-texts' is true, all color
# codes are stripped and players see plain text.
